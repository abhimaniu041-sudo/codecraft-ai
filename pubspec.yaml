name: codecraft_ai
description: AI powered creative studio
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AI & Network
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Image
  image_picker: ^1.0.4

  # Animation
  lottie: ^3.1.0

  # Audio
  audioplayers: ^6.0.0

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
