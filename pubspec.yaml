name: codecraft_ai
description: AI Video Generator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  provider: ^6.1.1
  uuid: ^4.2.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/characters/hero/
    - assets/characters/villain/
    - assets/characters/robot/
    - assets/characters/dragon/
    - assets/backgrounds/
    - assets/fx/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/lottie/
